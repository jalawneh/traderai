<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retell Chat Widget</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      min-height: 100vh;
    }

    .page-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .content {
      max-width: 700px;
    }

    .content h1 {
      margin-bottom: 10px;
      font-size: 2rem;
      color: #1f2937;
    }

    .content p {
      margin: 0;
      font-size: 1rem;
      color: #4b5563;
      line-height: 1.6;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-12px);
      }
      60% {
        transform: translateY(-6px);
      }
    }

    .retell-bounce {
      animation: bounce 1.2s infinite;
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="content">
      <h1>AI Chat Assistant</h1>
      <p>Click the chat icon in the corner to start chatting.</p>
    </div>
  </div>

  <!-- Retell stock widget -->
  <script
    id="retell-widget"
    src="https://dashboard.retellai.com/retell-widget.js"
    type="module"
    data-public-key="public_key_0b74d32971e4364d15024"
    data-agent-id="agent_a22e71c2e4717d7c80a03616c5"
  ></script>

  <script>
    let widgetElement = null;
    let bounceStarted = false;

    function tryAttachBounce() {
      const candidates = [
        'iframe[src*="retell"]',
        'div[id*="retell"]',
        'div[class*="retell"]',
        '[data-retell]',
        'retell-widget'
      ];

      for (const selector of candidates) {
        const found = document.querySelector(selector);
        if (found) {
          widgetElement = found;
          break;
        }
      }

      if (!widgetElement) return false;

      if (!bounceStarted) {
        bounceStarted = true;

        setTimeout(() => {
          if (widgetElement) {
            widgetElement.classList.add('retell-bounce');
          }
        }, 3000);
      }

      const stopBounce = () => {
        if (widgetElement) {
          widgetElement.classList.remove('retell-bounce');
        }
      };

      widgetElement.addEventListener('click', stopBounce, { once: true });
      widgetElement.addEventListener('mouseenter', stopBounce, { once: true });
      window.addEventListener('scroll', stopBounce, { once: true });

      return true;
    }

    const widgetWatcher = setInterval(() => {
      if (tryAttachBounce()) {
        clearInterval(widgetWatcher);
      }
    }, 300);

    setTimeout(() => {
      clearInterval(widgetWatcher);
    }, 15000);
  </script>
</body>
</html>
