<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Launch Chat</title>

  <script>
    function openChatWindow() {
      const chatHTML = `
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8" />
          <title>Chat</title>

          <script
            src="https://dashboard.retellai.com/retell-widget.js"
            type="module"
            data-public-key="public_key_0b74d32971e4364d15024"
            data-agent-id="agent_a22e71c2e4717d7c80a03616c5"
            data-auto-open="true"
          ><\/script>

          <style>
            body {
              margin: 0;
              background: white;
            }
          </style>
        </head>
        <body></body>
        </html>
      `;

      const chatWindow = window.open(
        "",
        "ChatWindow",
        "width=420,height=700,resizable=no,scrollbars=no"
      );

      if (chatWindow) {
        chatWindow.document.write(chatHTML);
        chatWindow.document.close();
      } else {
        alert("Popup blocked. Please allow popups for this site.");
      }
    }

    window.onload = openChatWindow;
  </script>
</head>

<body>
</body>
</html>
