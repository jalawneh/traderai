<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f5f7fb;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .top-actions {
      width: 430px;
      display: flex;
      justify-content: flex-start;
    }

    .return-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .chat-shell {
      width: 430px;
      height: 720px;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: white;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      background: white;
      z-index: 0;
    }

    iframe[src*="retell"],
    div[id*="retell"],
    div[class*="retell"] {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-actions">
      <button class="return-btn" onclick="goHome()">Return to Site</button>
    </div>

    <div class="chat-shell">
      <div class="loading">Loading chat...</div>
    </div>
  </div>

  <script>
    function goHome() {
      window.location.href = "https://daytrademindai.com";
    }

    const script = document.createElement("script");
    script.src = "https://dashboard.retellai.com/retell-widget.js";
    script.type = "module";
    script.id = "retell-widget";
    script.setAttribute("data-public-key", "public_key_0b74d32971e4364d15024");
    script.setAttribute("data-agent-id", "agent_a22e71c2e4717d7c80a03616c5");
    script.setAttribute("data-auto-open", "true");
    script.setAttribute("data-title", "AI Chat Assistant");

    script.onload = () => {
      setTimeout(() => {
        const loading = document.querySelector(".loading");
        if (loading) loading.style.display = "none";
      }, 3000);
    };

    document.head.appendChild(script);
  </script>
</body>
</html>
