    }

    .chat-shell {
      width: 420px;
      height: 760px;
      background: #ffffff;
      position: relative;
    }

    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 16px;

      padding: 20px;

    iframe[src*="retell"],
    div[id*="retell"],
    div[class*="retell"] {
      position: fixed !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 420px !important;
      height: 760px !important;

      max-height: 760px !important;
    }
  </style>

  <script
    id="retell-widget"
    src="https://dashboard.retellai.com/retell-widget.js"
    type="module"
    data-public-key="public_key_0b74d32971e4364d15024"
