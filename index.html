<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Chat</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      height: 100%;
    }

    body.launcher {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .status {
      color: #374151;
      font-size: 16px;
    }

    body.popup {
      background: #f5f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .app-window {
      width: 430px;
      height: 760px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      background: white;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header {
      height: 52px;
      background: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      flex-shrink: 0;
      font-size: 15px;
      font-weight: 600;
    }

    .return-btn {
      background: white;
      color: #111827;
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .chat-area {
      flex: 1;
      position: relative;
      background: white;
      overflow: hidden;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 15px;
      z-index: 0;
      background: white;
    }

    iframe[src*="retell"],
    div[id*="retell"],
    div[class*="retell"] {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
    }
  </style>
</head>
<body>
  <script>
    const isPopup = new URLSearchParams(window.location.search).get("popup") === "1";

    function goHome() {
      window.location.href = "https://daytrademindai.com";
    }

    function openPopup() {
      const popupUrl = window.location.origin + window.location.pathname + "?popup=1";
      const win = window.open(
        popupUrl,
        "DayTradeMindAIChat",
        "width=470,height=830,left=200,top=80,resizable=yes,scrollbars=no"
      );

      if (!win) {
        document.body.innerHTML = '<div class="status">Popup blocked. Please allow popups for this site.</div>';
        return;
      }

      win.focus();
      document.body.innerHTML = '<div class="status">Chat window opened. You can close this tab.</div>';
    }

    if (!isPopup) {
      document.body.className = "launcher";
      document.body.innerHTML = '<div class="status">Launching chat...</div>';
      setTimeout(openPopup, 400);
    } else {
      document.body.className = "popup";
      document.body.innerHTML = `
        <div class="app-window">
          <div class="header">
            <span>AI Chat Assistant</span>
            <button class="return-btn" onclick="goHome()">Return to Site</button>
          </div>
          <div class="chat-area">
            <div class="loading">Loading chat...</div>
          </div>
        </div>
      `;

      const script = document.createElement("script");
      script.src = "https://dashboard.retellai.com/retell-widget.js";
      script.type = "module";
      script.id = "retell-widget";
      script.setAttribute("data-public-key", "public_key_0b74d32971e4364d15024");
      script.setAttribute("data-agent-id", "agent_a22e71c2e4717d7c80a03616c5");
      script.setAttribute("data-auto-open", "true");
      script.setAttribute("data-title", "AI Chat Assistant");

      script.onload = () => {
        setTimeout(() => {
          const loading = document.querySelector(".loading");
          if (loading) loading.style.display = "none";
        }, 3000);
      };

      script.onerror = () => {
        const loading = document.querySelector(".loading");
        if (loading) loading.textContent = "Failed to load chat widget.";
      };

      document.head.appendChild(script);
    }
  </script>
</body>
</html>
