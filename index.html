<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #f5f7fb;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
}

/* Chat container */
.chat-container {
  width: 430px;
  height: 720px;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  background: white;
  display: flex;
  flex-direction: column;
}

/* Top bar */
.chat-header {
  height: 50px;
  background: #111827;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  font-size: 14px;
}

/* Return button */
.return-btn {
  background: transparent;
  border: none;
  color: white;
  cursor: pointer;
  font-size: 14px;
}

/* Chat area (Retell fills this) */
.chat-body {
  flex: 1;
  position: relative;
}

/* Force Retell to fill container */
iframe[src*="retell"],
div[id*="retell"],
div[class*="retell"] {
  position: absolute !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="chat-header">
    <span>AI Chat Assistant</span>
    <button class="return-btn" onclick="goHome()">Return</button>
  </div>

  <div class="chat-body"></div>

</div>

<script>
function goHome() {
  window.location.href = "https://daytrademindai.com";
}

/* Load Retell widget */
const script = document.createElement("script");
script.src = "https://dashboard.retellai.com/retell-widget.js";
script.type = "module";
script.setAttribute("data-public-key", "public_key_0b74d32971e4364d15024");
script.setAttribute("data-agent-id", "agent_a22e71c2e4717d7c80a03616c5");
script.setAttribute("data-auto-open", "true");

document.head.appendChild(script);
</script>

</body>
</html>
