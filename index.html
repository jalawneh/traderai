<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
}

/* Outer wrapper (fake window) */
.app-window {
  width: 430px;
  height: 760px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  background: #f5f7fb;
  display: flex;
  flex-direction: column;
}

/* Top bar */
.header {
  height: 50px;
  background: #111827;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  font-size: 14px;
}

/* Return button */
.return-btn {
  background: white;
  color: #111827;
  border: none;
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  font-weight: bold;
}

/* Chat area */
.chat-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: white;
}

/* FORCE widget into center area */
iframe[src*="retell"],
div[id*="retell"],
div[class*="retell"] {
  position: absolute !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  max-width: 100% !important;
  max-height: 100% !important;
}

/* Hide floating launcher button */
button[class*="retell"],
div[class*="launcher"] {
  display: none !important;
}
</style>
</head>

<body>

<div class="app-window">

  <div class="header">
    <span>AI Chat Assistant</span>
    <button class="return-btn" onclick="goHome()">Return</button>
  </div>

  <div class="chat-area"></div>

</div>

<script>
function goHome() {
  window.location.href = "https://daytrademindai.com";
}

/* Load Retell widget */
const script = document.createElement("script");
script.src = "https://dashboard.retellai.com/retell-widget.js";
script.type = "module";
script.setAttribute("data-public-key", "public_key_0b74d32971e4364d15024");
script.setAttribute("data-agent-id", "agent_a22e71c2e4717d7c80a03616c5");
script.setAttribute("data-auto-open", "true");

document.head.appendChild(script);
</script>

</body>
</html>
