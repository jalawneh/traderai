<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      min-height: 100vh;
    }

    .page-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .content {
      max-width: 900px;
    }

    .content h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
      color: #1f2937;
    }

    .content p {
      margin: 0;
      font-size: 1.1rem;
      color: #4b5563;
      line-height: 1.6;
    }

    /* Try to enlarge the opened widget/modal */
    iframe[src*="retell"],
    div[id*="retell"],
    div[class*="retell"] {
      max-width: 95vw !important;
      max-height: 90vh !important;
    }
  </style>

  <script
    id="retell-widget"
    src="https://dashboard.retellai.com/retell-widget.js"
    type="module"
    data-public-key="public_key_0b74d32971e4364d15024"
    data-agent-id="agent_a22e71c2e4717d7c80a03616c5"
    data-title="AI Chat Assistant"
    data-popup-message="Hi! How can I help?"
    data-show-ai-popup="true"
    data-show-ai-popup-time="3"
    data-auto-open="false"
  ></script>
</head>
<body>
  <div class="page-wrap">
    <div class="content">
      <h1>AI Chat Assistant</h1>
      <p>Click the chat icon in the corner to start chatting.</p>
    </div>
  </div>
</body>
</html>
