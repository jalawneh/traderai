<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retell Chat Launcher</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    body.launcher {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .launcher-box {
      text-align: center;
      padding: 24px;
    }

    .launcher-box h1 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #111827;
    }

    .launcher-box p {
      margin: 0 0 18px;
      color: #4b5563;
    }

    .launcher-box button {
      padding: 12px 18px;
      font-size: 16px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    body.popup {
      width: 430px;
      height: 720px;
      overflow: hidden;
      background: #ffffff;
    }

    .status {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
      color: #374151;
      background: #ffffff;
      z-index: 1;
    }

    .status.error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search);
    const isPopup = params.get("popup") === "1";

    function setStatus(message, isError = false) {
      document.body.innerHTML = `<div class="status ${isError ? "error" : ""}">${message}</div>`;
    }

    if (!isPopup) {
      document.body.className = "launcher";
      document.body.innerHTML = `
        <div class="launcher-box">
          <h1>AI Chat Assistant</h1>
          <p>Open the chat in a small window.</p>
          <button id="openChatBtn">Open Chat</button>
        </div>
      `;

      document.getElementById("openChatBtn").addEventListener("click", () => {
        const popupUrl = window.location.origin + window.location.pathname + "?popup=1";
        const win = window.open(
          popupUrl,
          "RetellChatWindow",
          "width=430,height=720,resizable=yes,scrollbars=no"
        );

        if (!win) {
          alert("Popup blocked. Please allow popups for this site.");
        }
      });
    } else {
      document.body.className = "popup";
      setStatus("Loading chat...");

      const script = document.createElement("script");
      script.src = "https://dashboard.retellai.com/retell-widget.js";
      script.type = "module";
      script.id = "retell-widget";
      script.setAttribute("data-public-key", "public_key_0b74d32971e4364d15024");
      script.setAttribute("data-agent-id", "agent_a22e71c2e4717d7c80a03616c5");
      script.setAttribute("data-auto-open", "true");
      script.setAttribute("data-title", "AI Chat Assistant");

      script.onload = () => {
        setTimeout(() => {
          const hasWidget =
            document.querySelector('iframe[src*="retell"]') ||
            document.querySelector('[id*="retell"]') ||
            document.querySelector('[class*="retell"]');

          if (!hasWidget) {
            setStatus(
              "Retell widget loaded, but no chat window appeared. This usually means the agent ID or public key is invalid, or the agent is not a chat agent.",
              true
            );
          }
        }, 4000);
      };

      script.onerror = () => {
        setStatus("Failed to load Retell widget script.", true);
      };

      document.head.appendChild(script);

      window.addEventListener("error", (e) => {
        setStatus("Page error: " + e.message, true);
      });
    }
  </script>
</body>
</html>
