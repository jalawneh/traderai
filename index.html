<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* Return button */
.return-btn {
  margin-bottom: 15px;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  background: #111827;
  color: white;
  cursor: pointer;
}

/* Center chat container */
.chat-container {
  width: 430px;
  height: 720px;
  border-radius: 20px;
  overflow: hidden;
  background: white;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  position: relative;
}

/* FORCE widget into container */
iframe[src*="retell"],
div[id*="retell"],
div[class*="retell"] {
  position: absolute !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  max-width: 100% !important;
  max-height: 100% !important;
  margin: 0 !important;
}
</style>
</head>

<body>

<button class="return-btn" onclick="goHome()">Return to Site</button>

<div class="chat-container"></div>

<script>
function goHome() {
  window.location.href = "https://daytrademindai.com";
}

/* Load widget */
const script = document.createElement("script");
script.src = "https://dashboard.retellai.com/retell-widget.js";
script.type = "module";
script.id = "retell-widget";
script.setAttribute("data-public-key", "public_key_0b74d32971e4364d15024");
script.setAttribute("data-agent-id", "agent_a22e71c2e4717d7c80a03616c5");
script.setAttribute("data-auto-open", "true");

document.head.appendChild(script);

/* FORCE reposition after load */
setTimeout(() => {
  const widget =
    document.querySelector('iframe[src*="retell"]') ||
    document.querySelector('[id*="retell"]') ||
    document.querySelector('[class*="retell"]');

  const container = document.querySelector(".chat-container");

  if (widget && container) {
    container.appendChild(widget);
  }
}, 2000);
</script>

</body>
</html>
