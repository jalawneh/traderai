<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: Arial, sans-serif;
    background: #f5f7fb;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
  }

  .return-btn {
    margin-bottom: 15px;
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: #111827;
    color: white;
    cursor: pointer;
    font-size: 14px;
  }

  .chat-frame {
    width: 430px;
    height: 720px;
    border-radius: 20px;
    background: white;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6b7280;
    font-size: 16px;
  }

  /* Let the widget appear naturally, but visually keep page focused */
  iframe[src*="retell"],
  div[id*="retell"],
  div[class*="retell"] {
    z-index: 9999 !important;
  }
</style>
</head>
<body>

<button class="return-btn" onclick="goHome()">Return to Site</button>

<div class="chat-frame" id="chatFrame">Loading chat...</div>

<script>
  function goHome() {
    window.location.href = "https://daytrademindai.com";
  }

  const script = document.createElement("script");
  script.src = "https://dashboard.retellai.com/retell-widget.js";
  script.type = "module";
  script.id = "retell-widget";
  script.setAttribute("data-public-key", "public_key_0b74d32971e4364d15024");
  script.setAttribute("data-agent-id", "agent_a22e71c2e4717d7c80a03616c5");
  script.setAttribute("data-auto-open", "true");
  script.setAttribute("data-title", "AI Chat Assistant");

  script.onload = () => {
    setTimeout(() => {
      document.getElementById("chatFrame").textContent = "";
    }, 3000);
  };

  script.onerror = () => {
    document.getElementById("chatFrame").textContent = "Failed to load chat widget.";
  };

  document.head.appendChild(script);
</script>

</body>
</html>
