<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auto Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f7fb;
      color: #333;
    }
  </style>
</head>
<body>
  <div>Launching chat...</div>

  <script>
    function openChat() {
      const popupUrl = window.location.origin + window.location.pathname + "?popup=1";

      const win = window.open(
        popupUrl,
        "RetellChatWindow",
        "width=450,height=760,resizable=yes,scrollbars=no"
      );

      if (!win) {
        document.body.innerHTML = "Popup blocked. Please allow popups for this site.";
      }
    }

    const params = new URLSearchParams(window.location.search);
    const isPopup = params.get("popup") === "1";

    if (!isPopup) {
      // Auto launch after short delay (helps avoid blocking)
      setTimeout(openChat, 500);
    } else {
      // Popup content (chat only)
      document.body.style.background = "transparent";
      document.body.style.margin = "0";
      document.body.style.overflow = "hidden";

      const shell = document.createElement("div");
      shell.style.width = "430px";
      shell.style.height = "720px";
      shell.style.margin = "auto";
      shell.style.position = "absolute";
      shell.style.top = "50%";
      shell.style.left = "50%";
      shell.style.transform = "translate(-50%, -50%)";
      shell.style.borderRadius = "18px";
      shell.style.overflow = "hidden";
      shell.style.boxShadow = "0 18px 50px rgba(0,0,0,0.25)";
      document.body.appendChild(shell);

      const script = document.createElement("script");
      script.src = "https://dashboard.retellai.com/retell-widget.js";
      script.type = "module";
      script.id = "retell-widget";
      script.setAttribute("data-public-key", "public_key_0b74d32971e4364d15024");
      script.setAttribute("data-agent-id", "agent_a22e71c2e4717d7c80a03616c5");
      script.setAttribute("data-auto-open", "true");
      document.head.appendChild(script);

      const style = document.createElement("style");
      style.innerHTML = `
        iframe[src*="retell"],
        div[id*="retell"],
        div[class*="retell"] {
          position: absolute !important;
          inset: 0 !important;
          width: 100% !important;
          height: 100% !important;
        }
      `;
      document.head.appendChild(style);
    }
  </script>
</body>
</html>
