<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Launch Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

/* POPUP LAYOUT */
.popup {
  display: flex;
  height: 100vh;
}

/* LEFT PANEL */
.info {
  width: 55%;
  padding: 30px;
  overflow-y: auto;
}

.info h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.info p {
  color: #5e6475;
  line-height: 1.6;
}

.highlight {
  background: #eef4ff;
  padding: 15px;
  border-radius: 12px;
  margin: 20px 0;
}

/* RIGHT CHAT PANEL */
.chat-wrap {
  width: 45%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.chat-box {
  width: 420px;
  height: 720px;
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  height: 50px;
  background: #111827;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
}

.return-btn {
  background: white;
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* CHAT AREA */
.chat-area {
  flex: 1;
  position: relative;
}

/* FORCE EMBED */
iframe[src*="retell"],
div[id*="retell"],
div[class*="retell"] {
  position: absolute !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
}

/* 🔥 HIDE FLOATING WIDGET */
button[class*="retell"],
div[class*="launcher"],
div[style*="bottom"] {
  display: none !important;
}
</style>
</head>

<body>

<script>
const isPopup = new URLSearchParams(window.location.search).get("popup") === "1";

function goHome() {
  window.location.href = "https://daytrademindai.com";
}

function openPopup() {
  const url = window.location.origin + window.location.pathname + "?popup=1";

  window.open(
    url,
    "ChatWindow",
    "width=1100,height=750,left=150,top=60,resizable=yes"
  );

  document.body.innerHTML = "Chat launched.";
}

/* ===== POPUP PAGE ===== */
if (isPopup) {
  document.body.className = "popup";

  document.body.innerHTML = `
    <div class="info">
      <button class="return-btn" onclick="goHome()">Return to Site</button>

      <h1>What the Platform Does</h1>
      <p>A full suite of AI, ML, and trading tools — built for serious day traders.</p>

      <div class="highlight">
        Chat with our virtual assistant for help with features, workflows, and trading tools.
      </div>

      <h2>Core Functionality</h2>
      <p><b>Premarket Scan</b> — early breakout detection</p>
      <p><b>Market Scan</b> — real-time stock scanning</p>
      <p><b>AI Analysis</b> — insights & reasoning</p>
      <p><b>ML Prediction</b> — breakout confidence</p>
      <p><b>Profit Plan</b> — structured trades</p>
      <p><b>Risk Allocation</b> — balanced selection</p>
    </div>

    <div class="chat-wrap">
      <div class="chat-box">
        <div class="header">
          <span>Virtual Assistant</span>
        </div>
        <div class="chat-area"></div>
      </div>
    </div>
  `;

  const script = document.createElement("script");
  script.src = "https://dashboard.retellai.com/retell-widget.js";
  script.type = "module";
  script.setAttribute("data-public-key", "public_key_0b74d32971e4364d15024");
  script.setAttribute("data-agent-id", "agent_a22e71c2e4717d7c80a03616c5");
  script.setAttribute("data-auto-open", "true");

  document.head.appendChild(script);
}

/* ===== LAUNCH PAGE ===== */
else {
  document.body.innerHTML = "Launching chat...";
  setTimeout(openPopup, 300);
}
</script>

</body>
</html>
